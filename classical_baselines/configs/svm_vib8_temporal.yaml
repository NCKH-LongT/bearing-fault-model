data_dir: data
manifest: data/manifest.csv
exclude_list: null

sampling_rate: 25600
window_seconds: 1.0
hop_seconds: 0.5

split_mode: temporal
random_seed: 42
temporal_ttf:
  train: [0.0, 60.0]
  val: [60.0, 70.0]
  test: [70.0, 100.0]

classical:
  model_type: svm
  feature_name: vib_stats_8d
  aggregation: mean_proba
  eval_split: test
  svm:
    C: 1.0
    kernel: rbf
    gamma: scale
    class_weight: balanced

log:
  out_dir: runs/classical/svm_vib8_temporal

debug:
  limit_files_train: null
  limit_files_val: null
  limit_files_test: null
  seconds_cap: null

