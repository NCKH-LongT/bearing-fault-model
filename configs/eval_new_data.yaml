# Eval-only config for running an existing checkpoint on new data
data_dir: data  # change to your new data folder
manifest: data/new_runs/manifest_run23.csv  # path to the new manifest
exclude_list: null

sampling_rate: 25600  # set to the actual SR of new data
window_seconds: 1.0
hop_seconds: 0.5

# Evaluate using temporal indexing; set test to full range
split_mode: temporal
stratified:
  train: 0.7
  val: 0.1
  test: 0.2
random_seed: 42

temporal_ttf:
  train: [0.0, 60.0]   # not used by eval
  val:   [60.0, 70.0]  # not used by eval
  test:  [0.0, 100.1]  # evaluate full lifecycle

stft:
  n_fft: 4096
  hop_length: 1024
  window: hann
  log_add: 1.0

input_size: [224, 224]
num_classes: 3

model:
  # IMPORTANT: must match the modality used when training the checkpoint
  # If the checkpoint was trained with temperature fusion, keep true and
  # provide zero-filled temperature columns if new data lacks temperature.
  use_temp: true

train:
  batch_size: 24
  num_workers: 4
  seed: 42

optim:
  use_onecycle: false
  pct_start: 0.3

log:
  out_dir: runs/eval_new_data
  save_best_by: macro_f1

debug:
  limit_files_test: null
  seconds_cap: null

