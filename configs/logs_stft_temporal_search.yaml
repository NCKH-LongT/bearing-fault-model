data_dir: data
manifest: data/manifest.csv
exclude_list: null

sampling_rate: 25600
window_seconds: 1.0
hop_seconds: 0.5

# Temporal split to mimic run-to-failure timeline (no leakage)
split_mode: temporal
stratified:
  train: 0.7
  val: 0.1
  test: 0.2
random_seed: 42

# Recommended TTF ranges (paper setting)
temporal_ttf:
  train: [0.0, 60.0]
  val:   [60.0, 70.0]
  test:  [70.0, 100.1]

stft:
  n_fft: 4096
  hop_length: 1024
  window: hann
  log_add: 1.0

input_size: [224, 224]
num_classes: 3

train:
  batch_size: 24
  # Fine-tune from stratified checkpoint
  init_from: runs/logs_stft_strat/auto_r22/best.pt
  epochs: 60
  lr: 5.0e-5
  weight_decay: 1.0e-2
  num_workers: 4
  prefetch_factor: 2
  seed: 42
  # Early stopping
  early_stop_patience: 20
  early_stop: true
  # Validation frequency and window cap (0 = full)
  eval_every: 1
  val_max_windows: 0
  # Start without class weights, enable balanced sampling
  use_class_weights: false
  balanced_sampling: true
  # Mixed precision on GPU
  use_amp: true
  # Label smoothing mild
  label_smoothing: 0.05

optim:
  use_onecycle: false
  pct_start: 0.3

log:
  out_dir: runs/logs_stft_temporal
  save_best_by: macro_f1

debug:
  limit_files_train: null
  limit_files_val: null
  limit_files_test: null
  seconds_cap: null

