data_dir: data
manifest: data/manifest.csv
exclude_list: null

sampling_rate: 25600
window_seconds: 1.0
hop_seconds: 0.5

split_mode: temporal
stratified:
  train: 0.7
  val: 0.1
  test: 0.2
random_seed: 42

temporal_ttf:
  train: [0.0, 80.0]
  val:   [80.0, 85.0]
  test:  [85.0, 100.1]

stft:
  n_fft: 2048
  hop_length: 512
  window: hann
  log_add: 1.0

input_size: [160, 160]
num_classes: 3

train:
  batch_size: 24
  init_from: runs/logs_stft_strat/auto_r22/best.pt
  epochs: 60
  lr: 2.0e-4
  weight_decay: 1.0e-2
  num_workers: 4
  prefetch_factor: 2
  seed: 42
  early_stop_patience: 20
  early_stop: true
  eval_every: 1
  val_max_windows: 0
  use_class_weights: false
  balanced_sampling: true
  use_amp: true
  label_smoothing: 0.05

optim:
  use_onecycle: false
  pct_start: 0.3

log:
  out_dir: runs/logs_stft_temporal/exp_r49_nocw
  save_best_by: macro_f1

debug:
  limit_files_train: null
  limit_files_val: null
  limit_files_test: null
  seconds_cap: null

