data_dir: data
manifest: data/manifest.csv
exclude_list: null

sampling_rate: 25600
window_seconds: 1.0
hop_seconds: 0.5

# Train with stratified split for stable learning (each split has all classes)
split_mode: stratified
stratified:
  train: 0.6
  val: 0.2
  test: 0.2
  min_per_class_val: 5
  min_per_class_test: 5
random_seed: 42

stft:
  n_fft: 4096
  hop_length: 1024
  window: hann
  log_add: 1.0

input_size: [224, 224]
num_classes: 3

train:
  batch_size: 24
  epochs: 80
  lr: 2.0e-4
  weight_decay: 1.0e-3
  num_workers: 4
  seed: 42
  # Enable early stopping for stratified training (more patience)
  early_stop_patience: 20
  early_stop: true
  prefetch_factor: 2
  eval_every: 1
  # Limit windows per file during validation to speed up
  val_max_windows: 50
  # Prefer balanced sampling; avoid double-counting with class weights
  use_class_weights: false
  # Enable mixed precision on GPU for speed
  use_amp: true
  # Stabilize early learning
  label_smoothing: 0.05
  # Encourage balanced sampling per-batch during training
  balanced_sampling: true

optim:
  use_onecycle: false
  pct_start: 0.3

log:
  out_dir: runs/logs_stft_strat
  save_best_by: macro_f1

# Full data (no debug caps)
debug:
  limit_files_train: null
  limit_files_val: null
  limit_files_test: null
  seconds_cap: null
