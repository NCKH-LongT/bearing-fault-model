# Level 2 (nhẹ) — Temporal fine-tune với feature nhiệt độ giàu hơn (context + diff)
#
# Mục tiêu:
# - Giữ protocol temporal theo TTF để chống leakage (deployment realism).
# - Fine-tune từ checkpoint stratified (đã học đặc trưng tổng quát) để ổn định hơn.
#
# Chạy theo thứ tự:
# 1) Train stratified: configs/ablation/logs_stft_train_strat_level2_tempctxdiff.yaml
# 2) Train temporal config này (init_from trỏ về best.pt của bước 1)

data_dir: data
manifest: data/manifest.csv
exclude_list: null

sampling_rate: 25600
window_seconds: 1.0
hop_seconds: 0.5

split_mode: temporal
stratified:
  train: 0.7
  val: 0.1
  test: 0.2
random_seed: 42

temporal_ttf:
  train: [0.0, 60.0]
  val: [60.0, 70.0]
  test: [70.0, 100.1]

stft:
  n_fft: 4096
  hop_length: 1024
  window: hann
  log_add: 1.0

input_size: [224, 224]
num_classes: 3

model:
  use_temp: true
  temp_feature:
    type: stats9_diff
    context_seconds: 120.0
    causal: true

train:
  batch_size: 24
  init_from: runs/logs_stft_strat_l2_tempctxdiff/best.pt
  epochs: 60
  lr: 3.0e-5
  weight_decay: 1.0e-2
  num_workers: 4
  prefetch_factor: 2
  seed: 42
  early_stop_patience: 12
  early_stop: true
  eval_every: 1
  val_max_windows: 50
  use_class_weights: false
  balanced_sampling: true
  use_amp: true

optim:
  use_onecycle: false
  pct_start: 0.3

log:
  out_dir: runs/logs_stft_temporal_l2_tempctxdiff
  save_best_by: macro_f1

debug:
  limit_files_train: null
  limit_files_val: null
  limit_files_test: null
  seconds_cap: null

